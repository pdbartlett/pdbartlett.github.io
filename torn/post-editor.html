<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Torn Forum Markdown Styler</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 20px;
      background: #191919;
      color: #e0e0e0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 260px;
      font-family: monospace;
      box-sizing: border-box;
      padding: 10px;
      background: #2b2b2b;
      color: #f0f0f0;
      border: 1px solid #444;
      border-radius: 4px;
      resize: vertical;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .theme-toggle-btn {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .theme-toggle-btn:hover {
      background: #444;
    }

    /* Output Box Theme States */
    .output-box {
      border: 1px solid #444;
      padding: 15px;
      min-height: 260px;
      box-sizing: border-box;
      border-radius: 4px;
      overflow-y: auto;
      transition: background-color 0.2s, color 0.2s;
    }

    /* Torn Dark Canvas (Default) */
    .output-box.dark-mode {
      background: #222222;
      color: #dddddd;
    }

    /* Torn Light Canvas */
    .output-box.light-mode {
      background: #f4f4f4;
      color: #111111;
      border-color: #ccc;
    }

    label {
      display: block;
      color: #bbb;
    }
  </style>
</head>
<body>

  <h2>Torn Forum Markdown Styler</h2>

  <div class="grid">
    <div>
      <label><strong>1. Markdown Input</strong></label>
      <textarea id="markdownInput"># Header Title <span class="meta">v1.0</span>

<div class="header-line">
  <span>Left Title Text</span>
  <span>Right Meta Text</span>
</div>

This is a paragraph formatted with Markdown and custom CSS.

* Point 1 {.accent}
* Point 2</textarea>
    </div>
    <div>
      <label><strong>2. CSS Styles</strong></label>
      <textarea id="cssInput">p, li { font-size: 14px; line-height: 1.5; }
h1 { color: #ff5555; border-bottom: 1px solid #444; margin-top: 0; }

.header-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #333333;
  color: #ffffff;
  padding: 8px 12px;
  border-radius: 4px;
  margin-bottom: 10px;
}

.meta { float: right; font-size: 12px; color: #888888; }
.accent { color: #ffcc00; font-weight: bold; }</textarea>
    </div>
  </div>

  <div class="grid">
    <div>
      <div class="preview-header">
        <label><strong>3. Rendered Output (Preview)</strong></label>
        <button id="toggleThemeBtn" class="theme-toggle-btn">Switch to Light Mode Preview</button>
      </div>
      <div id="preview" class="output-box dark-mode"></div>
    </div>
    <div>
      <label style="margin-bottom: 10px;"><strong>4. HTML Code (Paste into Torn)</strong></label>
      <textarea id="htmlOutput" readonly></textarea>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------
    // Helper to parse {#id .class key="val"} syntax into HTML attrs
    // -------------------------------------------------------------
    function parseAttributes(attrStr) {
      if (!attrStr) return '';
      const classes = [];
      const ids = [];

      const tokens = attrStr.trim().split(/\s+/);
      tokens.forEach(token => {
        if (token.startsWith('#')) {
          ids.push(token.slice(1));
        } else if (token.startsWith('.')) {
          classes.push(token.slice(1));
        }
      });

      let attrOutput = '';
      if (ids.length) attrOutput += ` id="${ids.join(' ')}"`;
      if (classes.length) attrOutput += ` class="${classes.join(' ')}"`;
      return attrOutput;
    }

    // -------------------------------------------------------------
    // Extend Marked renderer to support header and block attributes
    // -------------------------------------------------------------
    const attrRegex = /\s*\{([^}]+)\}\s*$/;

    marked.use({
      renderer: {
        heading(headingObj) {
          const text = headingObj.text || '';
          const depth = headingObj.depth || 1;
          const match = text.match(attrRegex);
          if (match) {
            const cleanText = text.replace(attrRegex, '');
            const attrs = parseAttributes(match[1]);
            return `<h${depth}${attrs}>${cleanText}</h${depth}>\n`;
          }
          return `<h${depth}>${text}</h${depth}>\n`;
        },
        paragraph(paragraphObj) {
          const text = paragraphObj.text || '';
          const match = text.match(attrRegex);
          if (match) {
            const cleanText = text.replace(attrRegex, '');
            const attrs = parseAttributes(match[1]);
            return `<p${attrs}>${cleanText}</p>\n`;
          }
          return `<p>${text}</p>\n`;
        },
        listitem(itemObj) {
          const text = itemObj.text || '';
          const match = text.match(attrRegex);
          if (match) {
            const cleanText = text.replace(attrRegex, '');
            const attrs = parseAttributes(match[1]);
            return `<li${attrs}>${cleanText}</li>\n`;
          }
          return `<li>${text}</li>\n`;
        }
      }
    });

    // -------------------------------------------------------------
    // Pure Browser CSS Inliner using native DOMParser
    // -------------------------------------------------------------
    function inlineCSS(htmlString, cssString) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlString, 'text/html');

      const styleEl = document.createElement('style');
      styleEl.textContent = cssString;
      document.head.appendChild(styleEl);
      const sheet = styleEl.sheet;

      try {
        const rules = sheet.cssRules || sheet.rules;
        for (let i = 0; i < rules.length; i++) {
          const rule = rules[i];
          if (rule.type === CSSRule.STYLE_RULE) {
            const targets = doc.querySelectorAll(rule.selectorText);
            targets.forEach(el => {
              const existingStyles = el.getAttribute('style') || '';
              const newStyles = rule.style.cssText;
              el.setAttribute('style', existingStyles ? `${existingStyles} ${newStyles}` : newStyles);
            });
          }
        }
      } catch (e) {
        console.error("CSS Parsing error:", e);
      } finally {
        document.head.removeChild(styleEl);
      }

      // Strip temporary attributes
      doc.querySelectorAll('*').forEach(el => {
        el.removeAttribute('class');
        el.removeAttribute('id');
      });

      return doc.body.innerHTML;
    }

    const mdInput = document.getElementById('markdownInput');
    const cssInput = document.getElementById('cssInput');
    const preview = document.getElementById('preview');
    const htmlOutput = document.getElementById('htmlOutput');
    const toggleBtn = document.getElementById('toggleThemeBtn');

    function convert() {
      const rawHtml = marked.parse(mdInput.value);
      const inlined = inlineCSS(rawHtml, cssInput.value);

      preview.innerHTML = inlined;
      htmlOutput.value = inlined;
    }

    // Toggle Preview Theme (Dark <-> Light)
    toggleBtn.addEventListener('click', () => {
      if (preview.classList.contains('dark-mode')) {
        preview.classList.remove('dark-mode');
        preview.classList.add('light-mode');
        toggleBtn.textContent = 'Switch to Dark Mode Preview';
      } else {
        preview.classList.remove('light-mode');
        preview.classList.add('dark-mode');
        toggleBtn.textContent = 'Switch to Light Mode Preview';
      }
    });

    mdInput.addEventListener('input', convert);
    cssInput.addEventListener('input', convert);

    convert();
  </script>
</body>
</html>
