<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Torn Forum Markdown Styler</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 20px;
      background: #191919;
      color: #e0e0e0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 260px;
      font-family: monospace;
      box-sizing: border-box;
      padding: 10px;
      background: #2b2b2b;
      color: #f0f0f0;
      border: 1px solid #444;
      border-radius: 4px;
      resize: vertical;
    }

    .output-box {
      border: 1px solid #444;
      padding: 15px;
      min-height: 260px;
      background: #222222;
      color: #dddddd;
      box-sizing: border-box;
      border-radius: 4px;
      overflow-y: auto;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <h2>Torn Forum Markdown Styler</h2>

  <div class="grid">
    <div>
      <label><strong>1. Markdown Input</strong></label>
      <textarea id="markdownInput"># Main Header {#title .highlight}

This paragraph has a special class. {.accent}

* Point 1 {#item1}
* Point 2 {.alert}

### Section Two

Blah, blah, blah...</textarea>
    </div>
    <div>
      <label><strong>2. CSS Styles</strong></label>
      <textarea id="cssInput">/* Targets standard tags */
p { color: #cccccc; font-size: 14px; line-height: 1.5; }

/* Targets specific classes applied via Markdown attributes */
.highlight { color: #ffcc00; border-bottom: 2px solid #ffcc00; }
.accent { color: #5bc0de; font-style: italic; }
.alert { color: #d9534f; font-weight: bold; }

/* Targets IDs applied via Markdown attributes */
#title { font-variant: small-caps; }
#item1 { color: #5cb85c; }</textarea>
    </div>
  </div>

  <div class="grid">
    <div>
      <label><strong>3. Rendered Output (Preview)</strong></label>
      <div id="preview" class="output-box"></div>
    </div>
    <div>
      <label><strong>4. HTML Code (Paste into Torn)</strong></label>
      <textarea id="htmlOutput" readonly></textarea>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------
    // Helper to parse {#id .class key="val"} syntax into HTML attrs
    // -------------------------------------------------------------
    function parseAttributes(attrStr) {
      if (!attrStr) return '';
      const classes = [];
      const ids = [];

      // Match #ids and .classes
      const tokens = attrStr.trim().split(/\s+/);
      tokens.forEach(token => {
        if (token.startsWith('#')) {
          ids.push(token.slice(1));
        } else if (token.startsWith('.')) {
          classes.push(token.slice(1));
        }
      });

      let attrOutput = '';
      if (ids.length) attrOutput += ` id="${ids.join(' ')}"`;
      if (classes.length) attrOutput += ` class="${classes.join(' ')}"`;
      return attrOutput;
    }

    // -------------------------------------------------------------
    // Extend Marked renderer to support header and block attributes
    // -------------------------------------------------------------
    const attrRegex = /\s*\{([^}]+)\}\s*$/;

    marked.use({
      renderer: {
        heading(headingObj) {
          // marked v12+ passes an object: { text, depth, raw }
          const text = headingObj.text || '';
          const depth = headingObj.depth || 1;

          const match = text.match(attrRegex);
          if (match) {
            const cleanText = text.replace(attrRegex, '');
            const attrs = parseAttributes(match[1]);
            return `<h${depth}${attrs}>${cleanText}</h${depth}>\n`;
          }
          return `<h${depth}>${text}</h${depth}>\n`;
        },
        paragraph(paragraphObj) {
          const text = paragraphObj.text || '';
          const match = text.match(attrRegex);
          if (match) {
            const cleanText = text.replace(attrRegex, '');
            const attrs = parseAttributes(match[1]);
            return `<p${attrs}>${cleanText}</p>\n`;
          }
          return `<p>${text}</p>\n`;
        },
        listitem(itemObj) {
          const text = itemObj.text || '';
          const match = text.match(attrRegex);
          if (match) {
            const cleanText = text.replace(attrRegex, '');
            const attrs = parseAttributes(match[1]);
            return `<li${attrs}>${cleanText}</li>\n`;
          }
          return `<li>${text}</li>\n`;
        }
      }
    });

    // -------------------------------------------------------------
    // Pure Browser CSS Inliner using native DOMParser
    // -------------------------------------------------------------
    function inlineCSS(htmlString, cssString) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlString, 'text/html');

      const styleEl = document.createElement('style');
      styleEl.textContent = cssString;
      document.head.appendChild(styleEl);
      const sheet = styleEl.sheet;

      try {
        const rules = sheet.cssRules || sheet.rules;
        for (let i = 0; i < rules.length; i++) {
          const rule = rules[i];
          if (rule.type === CSSRule.STYLE_RULE) {
            const targets = doc.querySelectorAll(rule.selectorText);
            targets.forEach(el => {
              const existingStyles = el.getAttribute('style') || '';
              const newStyles = rule.style.cssText;
              el.setAttribute('style', existingStyles ? `${existingStyles} ${newStyles}` : newStyles);
            });
          }
        }
      } catch (e) {
        console.error("CSS Parsing error:", e);
      } finally {
        document.head.removeChild(styleEl);
      }

      // Strip temporary id and class attributes so Torn gets clean inline styles
      doc.querySelectorAll('*').forEach(el => {
        el.removeAttribute('class');
        el.removeAttribute('id');
      });

      return doc.body.innerHTML;
    }

    const mdInput = document.getElementById('markdownInput');
    const cssInput = document.getElementById('cssInput');
    const preview = document.getElementById('preview');
    const htmlOutput = document.getElementById('htmlOutput');

    function convert() {
      const rawHtml = marked.parse(mdInput.value);
      const inlined = inlineCSS(rawHtml, cssInput.value);

      preview.innerHTML = inlined;
      htmlOutput.value = inlined;
    }

    mdInput.addEventListener('input', convert);
    cssInput.addEventListener('input', convert);

    convert();
  </script>
</body>
</html>
