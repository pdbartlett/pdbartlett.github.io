<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Torn Forum Markdown Styler</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 20px;
      background: #191919;
      color: #e0e0e0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 280px;
      font-family: monospace;
      box-sizing: border-box;
      padding: 10px;
      background: #2b2b2b;
      color: #f0f0f0;
      border: 1px solid #444;
      border-radius: 4px;
      resize: vertical;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .theme-toggle-btn {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .theme-toggle-btn:hover { background: #444; }

    .output-box {
      border: 1px solid #444;
      padding: 15px;
      min-height: 280px;
      box-sizing: border-box;
      border-radius: 4px;
      overflow-y: auto;
      transition: background-color 0.2s, color 0.2s;
    }

    .output-box.dark-mode { background: #222222; color: #dddddd; }
    .output-box.light-mode { background: #f4f4f4; color: #111111; border-color: #ccc; }

    label { display: block; color: #bbb; }
  </style>
</head>
<body>

  <h2>Torn Forum Markdown Styler</h2>

  <div class="grid">
    <div>
      <label><strong>1. Markdown Input</strong></label>
      <textarea id="markdownInput"><div class="header-line">Human Factor: Faction Togetherness</div>

# Member intro posts

## Purpose

To help members get to know each other better. Hat tip to [FK](https://www.torn.com/profiles.php?XID=4067013) for the idea!

## Logistics

Post a reply below with a little bit about yourself. Doesn't have to be a huge essay, or anything too deep. And of course it is entirely optional!

<div class="footer-line">Schwartz, on behalf of Faction Council</div></textarea>
    </div>
    <div>
      <label><strong>2. CSS Styles</strong></label>
      <textarea id="cssInput">.post-card {
  background-color: #242424;
  border: 1px solid #3a3a3a;
  border-radius: 6px;
  padding: 16px 20px;
}

.header-line {
  background-color: #333333;
  color: #ffffff;
  padding: 10px 14px;
  border-left: 4px solid #ff5555;
  border-radius: 3px;
  font-weight: bold;
  margin-bottom: 15px;
}

.footer-line {
  background-color: #2a2a2a;
  color: #999999;
  padding: 8px 12px;
  border-top: 1px solid #3d3d3d;
  font-size: 12px;
  margin-top: 20px;
  border-radius: 3px;
}

h1 { color: #ff5555; border-bottom: 1px solid #3d3d3d; padding-bottom: 4px; margin-top: 0; }
h2 { color: #e0e0e0; margin-top: 18px; }
p, li { font-size: 14px; line-height: 1.5; color: #cccccc; }
a { color: #5bc0de; text-decoration: none; font-weight: bold; }</textarea>
    </div>
  </div>

  <div class="grid">
    <div>
      <div class="preview-header">
        <label><strong>3. Rendered Output (Preview)</strong></label>
        <button id="toggleThemeBtn" class="theme-toggle-btn">Switch to Light Mode Preview</button>
      </div>
      <div id="preview" class="output-box dark-mode"></div>
    </div>
    <div>
      <label style="margin-bottom: 10px;"><strong>4. HTML Code (Paste into Torn)</strong></label>
      <textarea id="htmlOutput" readonly></textarea>
    </div>
  </div>

  <script>
    // Configure marked to handle GFM predictably
    marked.setOptions({ gfm: true, breaks: true });

    // Helper to parse {#id .class} attributes
    function parseAttributes(attrStr) {
      if (!attrStr) return '';
      const classes = [];
      const ids = [];

      const tokens = attrStr.trim().split(/\s+/);
      tokens.forEach(token => {
        if (token.startsWith('#')) ids.push(token.slice(1));
        else if (token.startsWith('.')) classes.push(token.slice(1));
      });

      let attrOutput = '';
      if (ids.length) attrOutput += ` id="${ids.join(' ')}"`;
      if (classes.length) attrOutput += ` class="${classes.join(' ')}"`;
      return attrOutput;
    }

    // Properly delegate token parsing through marked's internal parser
    const attrRegex = /\s*\{([^}]+)\}\s*$/;

    marked.use({
      renderer: {
        heading(token) {
          const depth = token.depth;
          // Use this.parser.parseInline to render links/bold inside headers
          const content = this.parser.parseInline(token.tokens);
          const match = content.match(attrRegex);
          if (match) {
            const cleanContent = content.replace(attrRegex, '');
            const attrs = parseAttributes(match[1]);
            return `<h${depth}${attrs}>${cleanContent}</h${depth}>\n`;
          }
          return `<h${depth}>${content}</h${depth}>\n`;
        },
        paragraph(token) {
          const content = this.parser.parseInline(token.tokens);
          const match = content.match(attrRegex);
          if (match) {
            const cleanContent = content.replace(attrRegex, '');
            const attrs = parseAttributes(match[1]);
            return `<p${attrs}>${cleanContent}</p>\n`;
          }
          return `<p>${content}</p>\n`;
        }
      }
    });

    // Native DOMParser CSS Inliner
    function inlineCSS(htmlString, cssString) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlString, 'text/html');

      const styleEl = document.createElement('style');
      styleEl.textContent = cssString;
      document.head.appendChild(styleEl);
      const sheet = styleEl.sheet;

      try {
        const rules = sheet.cssRules || sheet.rules;
        for (let i = 0; i < rules.length; i++) {
          const rule = rules[i];
          if (rule.type === CSSRule.STYLE_RULE) {
            const targets = doc.querySelectorAll(rule.selectorText);
            targets.forEach(el => {
              const existingStyles = el.getAttribute('style') || '';
              const newStyles = rule.style.cssText;
              el.setAttribute('style', existingStyles ? `${existingStyles} ${newStyles}` : newStyles);
            });
          }
        }
      } catch (e) {
        console.error("CSS Parsing error:", e);
      } finally {
        document.head.removeChild(styleEl);
      }

      // Strip temporary id/class markers
      doc.querySelectorAll('*').forEach(el => {
        el.removeAttribute('class');
        el.removeAttribute('id');
      });

      return doc.body.innerHTML;
    }

    const mdInput = document.getElementById('markdownInput');
    const cssInput = document.getElementById('cssInput');
    const preview = document.getElementById('preview');
    const htmlOutput = document.getElementById('htmlOutput');
    const toggleBtn = document.getElementById('toggleThemeBtn');

    function convert() {
      // 1. Render Markdown to HTML
      let rawHtml = marked.parse(mdInput.value);

      // 2. Programmatically wrap in outer .post-card container for continuous background
      rawHtml = `<div class="post-card">${rawHtml}</div>`;

      // 3. Inline CSS rules
      const inlined = inlineCSS(rawHtml, cssInput.value);

      // 4. Update preview and raw text
      preview.innerHTML = inlined;
      htmlOutput.value = inlined;
    }

    toggleBtn.addEventListener('click', () => {
      if (preview.classList.contains('dark-mode')) {
        preview.classList.remove('dark-mode');
        preview.classList.add('light-mode');
        toggleBtn.textContent = 'Switch to Dark Mode Preview';
      } else {
        preview.classList.remove('light-mode');
        preview.classList.add('dark-mode');
        toggleBtn.textContent = 'Switch to Light Mode Preview';
      }
    });

    mdInput.addEventListener('input', convert);
    cssInput.addEventListener('input', convert);

    convert();
  </script>
</body>
</html>
